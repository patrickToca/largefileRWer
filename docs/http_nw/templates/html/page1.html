<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPage - Example Page 1</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    
    <link rel="stylesheet" href="/static/css/page1.css">
</head>
<body>
    <div class="container">
        <h2>Enter Your Information</h2>
        {{if .Error}}
        <div class="error">{{.Error}}</div>
        {{end}}
        <form method="POST" action="/mypage_example_page1">
            <div class="form-group">
                <label for="surname">SURNAME:</label>
                <input type="text" id="surname" name="surname" required autofocus>
            </div>
            <div class="form-group">
                <label for="firstname">FIRSTNAME:</label>
                <input type="text" id="firstname" name="firstname" required>
            </div>
            <button type="submit">Submit</button>
        </form>
        <div class="page-indicator">
            📄 You are on: mypage_example_page1
        </div>
    </div>
</body>
</html>
