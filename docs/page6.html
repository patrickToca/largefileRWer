<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MyPage - Banking Overview</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    
    <link rel="stylesheet" href="/static/css/page6.css">
</head>
<body>
    <div class="fullscreen-svg">
        <!-- Background Image -->
        <img src="/img/identifyCustomerForLogin.svg"
             class="fullscreen-svg-image"
             id="bankingImage"
             alt="Banking Overview">
        
        <!-- Container for independently positioned form elements -->
        <div class="form-elements-container">
            <form method="POST" action="/mypage_example_page6" autocomplete="off">
                <!-- Title - Independent position -->
                <!--<h2 class="form-title">Enter Your Information</h2>-->
                <h2 class="form-title"></h2>
                
                <!-- Error message - Independent position -->
                {{if .Error}}
                <div class="error">{{.Error}}</div>
                {{end}}
                
                <!-- Surname field - Independent position -->
                <div class="form-group-surname">
                    <!--<label for="surname">SURNAME:</label>-->
                    <input type="text" id="surname" name="surname" required autofocus autocomplete="off">
                </div>
                
                <!-- Firstname field - Independent position -->
                <div class="form-group-firstname">
                    <!--<label for="firstname">FIRSTNAME:</label>-->
                    <input type="text" id="firstname" name="firstname" required autocomplete="off">
                </div>
                
                <!-- Login button - Independent position and styling -->
                <button type="submit" class="login-button">Log in</button>
            </form>
        </div>
        
        <!-- INVISIBLE BUTTON - Centered -->
        <a href="/mypage_example_page5" class="statement-button" id="statementButton" aria-label="Statement">Statement</a>
        
        <!-- Page indicator -->
        <div class="page-indicator">
            📄 mypage_example_page6
        </div>
    </div>
    
    <script src="/static/js/page6.js"></script>
</body>
</html>
