<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Login - MyPage</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    
    <link rel="stylesheet" href="/static/css/page6.css">
</head>
<body>
    <div class="fullscreen-svg">
        <!-- Background Image -->
        <img src="/img/identifyCustomerForLogin.svg"
             class="fullscreen-svg-image"
             id="bankingImage"
             alt="Banking Login">
        
        <!-- Container for form elements -->
        <div class="form-elements-container">
            <!-- Form navigates to page4 when submitted -->
            <form method="GET" action="/mypage_example_page4" autocomplete="off">
                <h2 class="form-title">Sign In</h2>
                
                <!-- Surname field - accepts digits, no placeholder -->
                <div class="form-group-surname">
                    <input type="text" 
                           id="surname" 
                           name="surname" 
                           autocomplete="off">
                </div>
                
                <!-- Firstname field - accepts digits, no placeholder -->
                <div class="form-group-firstname">
                    <input type="text" 
                           id="firstname" 
                           name="firstname" 
                           autocomplete="off">
                </div>
                
                <!-- Login button - navigates to page4 -->
                <button type="submit" class="login-button">Log in</button>
            </form>
        </div>
        
        <!-- Page indicator -->
        <div class="page-indicator">
            📄 Page 6: Login (Enter Digits)
        </div>
    </div>
    
    <script src="/static/js/page6.js"></script>
</body>
</html>
