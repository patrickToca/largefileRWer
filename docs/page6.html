<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MyPage - Banking Overview</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    
    <link rel="stylesheet" href="/static/css/page6.css">
</head>
<body>
    <div class="fullscreen-svg">
        <!-- Background Image -->
        <img src="/img/identifyCustomerForLogin.svg"
             class="fullscreen-svg-image"
             id="bankingImage"
             alt="Banking Overview">
        
        <!-- Direct Form Fields - No Container, Centered -->
        <div class="form-fields-centered">
            <h2>Enter Your Information</h2>
            {{if .Error}}
            <div class="error">{{.Error}}</div>
            {{end}}
            <form method="POST" action="/mypage_example_page6">
                <div class="form-group">
                    <label for="surname">SURNAME:</label>
                    <input type="text" id="surname" name="surname" required autofocus>
                </div>
                <div class="form-group">
                    <label for="firstname">FIRSTNAME:</label>
                    <input type="text" id="firstname" name="firstname" required>
                </div>
                <button type="submit">Submit</button>
            </form>
        </div>
        
        <!-- INVISIBLE BUTTON - Centered -->
        <a href="/mypage_example_page5" class="statement-button" id="statementButton" aria-label="Statement">Statement</a>
        
        <!-- Page indicator -->
        <div class="page-indicator">
            📄 mypage_example_page6
        </div>
    </div>
    
    <script src="/static/js/page6.js"></script>
</body>
</html>
