<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MyPage - Banking Overview</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    
    <link rel="stylesheet" href="/static/css/page4.css">
</head>
<body>
    <div class="fullscreen-svg">
        <!-- IMAGE MAP APPROACH: img tag with usemap attribute -->
        <img src="/img/identifyCustomerForLogin.svg"
             usemap="#bankingMap" 
             class="fullscreen-svg-image"
             id="bankingImage"
             alt="Banking Overview - Click on Select Credit Card button">
        
        <!-- IMAGE MAP APPROACH: map definition with area tags -->
        <map name="bankingMap">
            <h2>Enter Your Information</h2>
            {{if .Error}}
            <div class="error">{{.Error}}</div>
            {{end}}
            <form method="POST" action="/mypage_example_page1">
                <div class="form-group">
                    <label for="surname">SURNAME:</label>
                    <input type="text" id="surname" name="surname" required autofocus>
                </div>
                <div class="form-group">
                    <label for="firstname">FIRSTNAME:</label>
                    <input type="text" id="firstname" name="firstname" required>
                </div>
                <button type="submit">Submit</button>
            </form>
            <div class="page-indicator">
                📄 You are on: mypage_example_page1
            </div>
        </map>
        
        <!-- INVISIBLE BUTTON - Bottom Left Corner -->
        <a href="/mypage_example_page5" class="statement-button" id="statementButton" aria-label="Statement">Statement</a>
        
        <!-- Back button overlay -->
        <!--<div class="back-button-container">
            <form method="GET" action="/mypage_example_page1">
                <button type="submit" class="back-button">← Back to Start</button>
            </form>
            <div class="page-indicator">
                📄 mypage_example_page4
            </div>
        </div>-->
    </div>
    
    <!-- JavaScript for responsive coordinates and auto-hide controls -->
    <script src="/static/js/page4.js"></script>
</body>
</html>
