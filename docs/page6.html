<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Login - MyPage</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    
    <link rel="stylesheet" href="/static/css/page6.css">
</head>
<body>
    <div class="fullscreen-svg">
        <!-- Background Image -->
        <img src="/img/identifyCustomerForLogin.svg"
             class="fullscreen-svg-image"
             id="bankingImage"
             alt="Banking Login">
        
        <!-- Container for form elements -->
        <div class="form-elements-container">
            <!-- Form with JavaScript override -->
            <form id="loginForm" autocomplete="off">
                <h2 class="form-title">Sign In</h2>
                
                <!-- Surname field - accepts digits -->
                <div class="form-group-surname">
                    <input type="text" 
                           id="surname" 
                           name="surname" 
                           placeholder="Enter digits (e.g., 12345)" 
                           autocomplete="off">
                </div>
                
                <!-- Firstname field - accepts digits -->
                <div class="form-group-firstname">
                    <input type="text" 
                           id="firstname" 
                           name="firstname" 
                           placeholder="Enter digits (e.g., 67890)" 
                           autocomplete="off">
                </div>
                
                <!-- Login button -->
                <button type="submit" class="login-button">Log in</button>
            </form>
        </div>
        
        <!-- Page indicator -->
        <div class="page-indicator">
            📄 Page 6: Login (Enter Digits)
        </div>
    </div>
    
    <script>
        // Override form submission to go to page4
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent default form submission
            
            // Get values
            const surname = document.getElementById('surname').value;
            const firstname = document.getElementById('firstname').value;
            
            // Build URL
            let url = '/mypage_example_page4';
            const params = new URLSearchParams();
            if (surname) params.append('surname', surname);
            if (firstname) params.append('firstname', firstname);
            if (params.toString()) url += '?' + params.toString();
            
            // Navigate
            window.location.href = url;
        });
        
        // Allow only digits
        document.addEventListener('DOMContentLoaded', function() {
            const surnameInput = document.getElementById('surname');
            const firstnameInput = document.getElementById('firstname');
            
            function allowOnlyDigits(input) {
                if (input) {
                    input.addEventListener('input', function() {
                        this.value = this.value.replace(/[^\d]/g, '');
                    });
                }
            }
            
            allowOnlyDigits(surnameInput);
            allowOnlyDigits(firstnameInput);
        });
    </script>
</body>
</html>
