<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MyPage - Banking Summary</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    
    <link rel="stylesheet" href="/static/css/page5.css">
</head>
<body>
    <div class="fullscreen-svg">
        <img src="/img/onlinebanking.nationwide_co_uk.svg" alt="Banking Summary" class="fullscreen-svg-image">
        
        <!-- Back button overlay -->
        <div class="back-button-container">
            <form method="GET" action="/mypage_example_page1">
                <button type="submit" class="back-button">← Back to Start</button>
            </form>
            <div class="page-indicator">
                📄 mypage_example_page5
            </div>
        </div>
    </div>
    
    <script>
        // Auto-hide back button after 3 seconds of inactivity
        let timeout;
        const controls = document.querySelector('.back-button-container');
        
        function showControls() {
            controls.style.opacity = '0.7';
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                controls.style.opacity = '0.2';
            }, 3000);
        }
        
        if (controls) {
            controls.addEventListener('mousemove', showControls);
            controls.addEventListener('click', showControls);
            
            // Initial auto-hide
            setTimeout(() => {
                controls.style.opacity = '0.2';
            }, 3000);
        }
    </script>
</body>
</html>
