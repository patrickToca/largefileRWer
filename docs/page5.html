<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Recent transactions | Nationwide Internet Bank</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    
    <link rel="stylesheet" href="/static/css/page5.css">
</head>
<body>
    <div class="responsive-container">
        <img src="/img/onlinebanking.nationwide.co.uk.ib.accounts.statement.1.svg"
             class="responsive-image"
             id="bankingImage"
             alt="Banking Overview - Click on Select Credit Card button">
        
        <!-- Back button overlay (optional - uncomment if needed) -->
        <!--<div class="back-button-container">
            <form method="GET" action="/mypage_example_page1">
                <button type="submit" class="back-button">← Back to Start</button>
            </form>
            <div class="page-indicator">
                📄 mypage_example_page5
            </div>
        </div>-->
    </div>
    
    <script>
        // Optional: Auto-hide back button after 3 seconds of inactivity
        let timeout;
        const controls = document.querySelector('.back-button-container');
        
        function showControls() {
            if (controls) {
                controls.style.opacity = '0.7';
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    controls.style.opacity = '0.2';
                }, 3000);
            }
        }
        
        if (controls) {
            controls.addEventListener('mousemove', showControls);
            controls.addEventListener('click', showControls);
            
            // Initial auto-hide
            setTimeout(() => {
                controls.style.opacity = '0.2';
            }, 3000);
        }
    </script>
</body>
</html>
