<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MyPage - Credit Card Details</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    
    <link rel="stylesheet" href="/static/css/page5.css">
</head>
<body>
    <div class="fullscreen-svg">
        <div class="credit-card-container">
            <div class="credit-card">
                <div class="card-header">
                    <span class="bank-name">🏦 NATIONWIDE</span>
                    <span class="card-type">💳 CREDIT CARD</span>
                </div>
                <div class="card-number">
                    •••• •••• •••• 1234
                </div>
                <div class="card-details">
                    <div class="card-holder">
                        <div class="label">Card Holder</div>
                        <div class="value">PATRICK TOCA</div>
                    </div>
                    <div class="card-expiry">
                        <div class="label">Expires</div>
                        <div class="value">12/28</div>
                    </div>
                </div>
                <div class="card-balance">
                    <div class="label">Available Credit</div>
                    <div class="value">€ 15,000.00</div>
                </div>
                <div class="card-footer">
                    <div class="visa-logo">VISA</div>
                </div>
            </div>
        </div>
        
        <!-- Back button overlay -->
        <div class="back-button-container">
            <form method="GET" action="/mypage_example_page1">
                <button type="submit" class="back-button">← Back to Start</button>
            </form>
            <div class="page-indicator">
                📄 mypage_example_page5
            </div>
        </div>
    </div>
    
    <script>
        // Auto-hide back button after 3 seconds of inactivity
        let timeout;
        const controls = document.querySelector('.back-button-container');
        
        function showControls() {
            controls.style.opacity = '0.7';
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                controls.style.opacity = '0.2';
            }, 3000);
        }
        
        if (controls) {
            controls.addEventListener('mousemove', showControls);
            controls.addEventListener('click', showControls);
            
            // Initial auto-hide
            setTimeout(() => {
                controls.style.opacity = '0.2';
            }, 3000);
        }
    </script>
</body>
</html>
