    <div class="fullscreen-svg">
        <!-- IMAGE MAP APPROACH: img tag with usemap attribute -->

             class="fullscreen-svg-image"
             id="bankingImage"
             alt="Banking Overview - Click on Select Credit Card button">
        
        <!-- IMAGE MAP APPROACH: map definition with area tags -->
        <map name="bankingMap">
            <area shape="rect" 
                  coords="150,320,350,370" 
                  href="/mypage_example_page5" 
                  alt="Select Credit Card"
                  title="Click to view credit card details">
        </map>
        
        <!-- INVISIBLE BUTTON - Bottom Left Corner -->
        <a href="/mypage_example_page5" class="statement-button" id="statementButton" aria-label="Statement">Statement</a>
